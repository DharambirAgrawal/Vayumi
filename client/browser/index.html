client/browser/index.html — Vayumi Browser Client

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vayumi</title>
    <style>
        /* ── Reset & Base ─────────────────────────────────────── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.4);
            --text-primary: #eaeaea;
            --text-secondary: #a0a0b8;
            --text-muted: #6c6c80;
            --success: #00d68f;
            --warning: #ffaa00;
            --border: #2a2a4a;
            --radius: 12px;
            --transition: 0.25s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                         'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Login Screen ─────────────────────────────────────── */
        #login-screen {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .login-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .login-logo {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }

        .login-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: border-color var(--transition);
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition), box-shadow var(--transition);
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background: #d63a53;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-error {
            display: none;
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--accent);
            text-align: left;
        }

        .login-error.visible {
            display: block;
        }

        .login-footer {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .auth-success-hint {
            display: none;
            font-size: 0.85rem;
            color: var(--success);
            margin-bottom: 1rem;
            text-align: center;
        }

        .auth-success-hint:not([hidden]) {
            display: block;
        }

        /* ── Main Interface ───────────────────────────────────── */
        #main-interface {
            width: 100%;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            display: none;
            flex-direction: column;
            padding: 0;
        }

        #main-interface.visible {
            display: flex;
        }

        /* ── Top Bar ──────────────────────────────────────────── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.25rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .top-bar-brand {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--accent);
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* ── Status Indicator ─────────────────────────────────── */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background var(--transition), box-shadow var(--transition);
        }

        .status-dot.sleeping {
            background: var(--text-muted);
        }

        .status-dot.listening {
            background: var(--success);
            box-shadow: 0 0 8px rgba(0, 214, 143, 0.6);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        .status-dot.processing {
            background: var(--warning);
            box-shadow: 0 0 8px rgba(255, 170, 0, 0.5);
            animation: pulse-dot 0.8s ease-in-out infinite;
        }

        .status-dot.speaking {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulse-dot 1s ease-in-out infinite;
        }

        .status-dot.disconnected {
            background: #ff4444;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Mode Switcher ────────────────────────────────────── */
        .mode-switcher {
            display: flex;
            gap: 0.25rem;
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 3px;
        }

        .mode-btn {
            padding: 0.35rem 0.75rem;
            background: transparent;
            color: var(--text-muted);
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all var(--transition);
        }

        .mode-btn:hover {
            color: var(--text-primary);
        }

        .mode-btn.active {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        /* ── Transcript Area ──────────────────────────────────── */
        .transcript-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            scroll-behavior: smooth;
            background:
                radial-gradient(circle at top, rgba(233, 69, 96, 0.08), transparent 36%),
                linear-gradient(180deg, rgba(255,255,255,0.02), transparent 18%);
        }

        .transcript-area::-webkit-scrollbar {
            width: 6px;
        }

        .transcript-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .transcript-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .transcript-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.6;
            border: 1px dashed rgba(160, 160, 184, 0.18);
            border-radius: 16px;
            background: rgba(255,255,255,0.02);
            padding: 1rem;
        }

        .transcript-entry {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            max-width: min(82%, 42rem);
            animation: fade-in 0.3s ease;
        }

        .transcript-entry.user {
            align-self: flex-end;
        }

        .transcript-entry.assistant {
            align-self: flex-start;
        }

        .transcript-speaker {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .transcript-entry.user .transcript-speaker {
            text-align: right;
        }

        .transcript-bubble {
            padding: 0.7rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .transcript-entry.user .transcript-bubble {
            background: linear-gradient(180deg, rgba(15, 52, 96, 0.95), rgba(15, 52, 96, 0.82));
            border: 1px solid rgba(233, 69, 96, 0.15);
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.18);
        }

        .transcript-entry.assistant .transcript-bubble {
            background: linear-gradient(180deg, rgba(22, 33, 62, 0.98), rgba(22, 33, 62, 0.82));
            border: 1px solid rgba(42, 42, 74, 0.95);
            border-bottom-left-radius: 4px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.18);
        }

        .transcript-bubble.streaming::after {
            content: "▊";
            animation: blink-cursor 0.7s step-end infinite;
            color: var(--accent);
            margin-left: 2px;
        }

        @keyframes blink-cursor {
            50% { opacity: 0; }
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Notification Toast ───────────────────────────────── */
        .notification-area {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }

        .notification-toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            max-width: 320px;
            animation: slide-in-toast 0.3s ease, fade-out-toast 0.4s ease 4s forwards;
            pointer-events: auto;
        }

        .notification-source {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }

        .notification-preview {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        @keyframes slide-in-toast {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fade-out-toast {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* ── Error Banner ─────────────────────────────────────── */
        .error-banner {
            display: none;
            padding: 0.6rem 1.25rem;
            background: rgba(233, 69, 96, 0.12);
            border-bottom: 1px solid var(--accent);
            font-size: 0.85rem;
            color: var(--accent);
            text-align: center;
            flex-shrink: 0;
        }

        .error-banner.visible {
            display: block;
        }

        /* ── Disconnected Overlay ─────────────────────────────── */
        .disconnected-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(13, 13, 13, 0.85);
            z-index: 900;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }

        .disconnected-overlay.visible {
            display: flex;
        }

        .disconnected-overlay .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .disconnected-overlay .message {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Bottom Controls ──────────────────────────────────── */
        .bottom-controls {
            padding: 1rem 1.25rem;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Mic Button */
        .mic-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .mic-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .mic-btn.active {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 24px var(--accent-glow);
            animation: pulse-ring 2s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 12px var(--accent-glow); }
            50% { box-shadow: 0 0 32px var(--accent-glow); }
        }

        .mic-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Interrupt Button */
        .interrupt-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .interrupt-btn:hover {
            border-color: var(--warning);
            color: var(--warning);
        }

        .interrupt-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Text Input */
        .text-input-wrapper {
            flex: 1;
            position: relative;
        }

        .text-input {
            width: 100%;
            padding: 0.85rem 1rem;
            padding-right: 3rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 28px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: border-color var(--transition);
        }

        .text-input:focus {
            border-color: var(--accent);
        }

        .text-input::placeholder {
            color: var(--text-muted);
        }

        .text-send-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.75;
            transition: opacity var(--transition), transform var(--transition);
        }

        .text-send-btn:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.04);
        }

        .text-send-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* ── Responsive ───────────────────────────────────────── */
        @media (max-width: 600px) {
            .top-bar {
                padding: 0.6rem 0.75rem;
            }

            .transcript-entry {
                max-width: 92%;
            }

            .bottom-controls {
                padding: 0.75rem;
            }

            .mic-btn {
                width: 48px;
                height: 48px;
            }

            .mode-btn {
                padding: 0.3rem 0.5rem;
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>

    <!-- ================================================================= -->
    <!-- Login Screen                                                      -->
    <!-- ================================================================= -->
    <div id="login-screen">
        <div class="login-container">
            <div class="login-logo">VAYUMI</div>
            <div class="login-subtitle">Ambient AI Assistant</div>

            <div id="login-error" class="login-error" role="alert"></div>
            <p id="auth-success-hint" class="auth-success-hint" hidden></p>

            <div id="login-panel">
                <form id="login-form" autocomplete="on">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="you@example.com"
                            autocomplete="email"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                        />
                    </div>

                    <button type="submit" class="login-btn" id="login-btn">
                        Sign In
                    </button>
                </form>

                <div class="login-footer">
                    Don't have an account?
                    <a href="#" id="link-show-register">Register</a>
                </div>
            </div>

            <div id="register-panel" hidden>
                <form id="register-form" autocomplete="on">
                    <div class="form-group">
                        <label for="reg-display-name">Display name</label>
                        <input
                            type="text"
                            id="reg-display-name"
                            name="display_name"
                            placeholder="Your name"
                            autocomplete="name"
                            required
                            minlength="1"
                            maxlength="100"
                        />
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input
                            type="email"
                            id="reg-email"
                            name="email"
                            placeholder="you@example.com"
                            autocomplete="email"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input
                            type="password"
                            id="reg-password"
                            name="password"
                            placeholder="At least 8 characters"
                            autocomplete="new-password"
                            required
                            minlength="8"
                            maxlength="128"
                        />
                    </div>
                    <button type="submit" class="login-btn" id="register-btn">
                        Create account
                    </button>
                </form>
                <div class="login-footer">
                    Already have an account?
                    <a href="#" id="link-show-login">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <!-- ================================================================= -->
    <!-- Main Interface (hidden until authenticated)                       -->
    <!-- ================================================================= -->
    <div id="main-interface">

        <!-- ── Top Bar ────────────────────────────────────────── -->
        <div class="top-bar">
            <div class="top-bar-brand">VAYUMI</div>

            <div class="top-bar-right">
                <!-- Mode Switcher -->
                <div class="mode-switcher" role="group" aria-label="Mode selection">
                    <button class="mode-btn active" data-mode="normal" title="Normal mode">
                        Normal
                    </button>
                    <button class="mode-btn" data-mode="meeting" title="Meeting mode">
                        Meeting
                    </button>
                    <button class="mode-btn" data-mode="focus" title="Focus mode">
                        Focus
                    </button>
                </div>

                <!-- Status Indicator -->
                <div class="status-indicator" aria-live="polite">
                    <span class="status-dot sleeping" id="status-dot"></span>
                    <span id="status-label">Sleeping</span>
                </div>
            </div>
        </div>

        <!-- ── Error Banner ───────────────────────────────────── -->
        <div id="error-banner" class="error-banner" role="alert"></div>

        <!-- ── Transcript Area ────────────────────────────────── -->
        <div class="transcript-area" id="transcript-area" aria-label="Conversation transcript">
            <div class="transcript-empty" id="transcript-empty">
                <div>
                    Tap the microphone to start a conversation<br/>
                    <span style="font-size:0.75rem; color:var(--text-muted);">
                        or type a message below
                    </span>
                </div>
            </div>
        </div>

        <!-- ── Bottom Controls ────────────────────────────────── -->
        <div class="bottom-controls">
            <div class="controls-row">
                <!-- Mic Button -->
                <button
                    class="mic-btn"
                    id="mic-btn"
                    title="Toggle microphone"
                    aria-label="Toggle microphone"
                >
                    <!-- Mic SVG Icon -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>

                <!-- Text Input -->
                <div class="text-input-wrapper">
                    <input
                        type="text"
                        class="text-input"
                        id="text-input"
                        placeholder="Type a message or paste a URL…"
                        autocomplete="off"
                    />
                    <button
                        class="text-send-btn"
                        id="text-send-btn"
                        title="Send message"
                        aria-label="Send message"
                    >
                        <!-- Send Arrow SVG -->
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>

                <!-- Interrupt Button -->
                <button
                    class="interrupt-btn"
                    id="interrupt-btn"
                    title="Interrupt / Stop"
                    aria-label="Interrupt playback"
                >
                    <!-- Stop Square SVG -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ================================================================= -->
    <!-- Notification Area (toasts)                                        -->
    <!-- ================================================================= -->
    <div class="notification-area" id="notification-area" aria-live="polite"></div>

    <!-- ================================================================= -->
    <!-- Disconnected Overlay                                              -->
    <!-- ================================================================= -->
    <div class="disconnected-overlay" id="disconnected-overlay">
        <div class="spinner"></div>
        <div class="message">Reconnecting…</div>
    </div>

    <!-- ================================================================= -->
    <!-- Scripts                                                           -->
    <!-- ================================================================= -->
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
