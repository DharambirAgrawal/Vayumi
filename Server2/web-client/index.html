<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vayumi — Dev Client</title>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --border: #2a2a30;
    --text: #e4e4e8;
    --muted: #8b8b95;
    --accent: #7c3aed;
    --accent-dim: #5b21b6;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --font: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    font-size: 13px;
  }
  header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 600; }
  .status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .status.connected { color: var(--green); border-color: var(--green); }
  .status.closed { color: var(--red); border-color: var(--red); }
  .status.connecting { color: var(--yellow); border-color: var(--yellow); }
  .connect-bar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  input, button {
    font-family: var(--font);
    font-size: 12px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    outline: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    cursor: pointer;
    background: var(--accent-dim);
    border-color: var(--accent);
    white-space: nowrap;
  }
  button:hover { background: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #token { flex: 1; min-width: 100px; }
  .log-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .log-entry {
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-entry.sent { color: var(--accent); }
  .log-entry.recv { color: var(--green); }
  .log-entry.caption { color: #38bdf8; }
  .log-entry.info { color: var(--muted); }
  .log-entry.error { color: var(--red); }
  .input-bar {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  #chatInput { flex: 1; }
</style>
</head>
<body>
  <header>
    <h1>Vayumi</h1>
    <span id="status" class="status closed">closed</span>
  </header>

  <div class="connect-bar">
    <input id="token" type="text" placeholder="Token (use 'dev' for dev mode)" value="dev">
    <button id="btnConnect">Connect</button>
    <button id="btnDisconnect" disabled>Disconnect</button>
  </div>

  <div class="log-area" id="logArea"></div>

  <div class="input-bar">
    <input id="chatInput" type="text" placeholder="Type a message..." disabled>
    <button id="btnSend" disabled>Send</button>
    <button id="btnRecord" disabled>Record 1s</button>
    <button id="btnInterrupt" disabled>Interrupt</button>
  </div>

  <script src="client.js"></script>
</body>
</html>
