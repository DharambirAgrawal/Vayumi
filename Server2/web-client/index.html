<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vayumi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Vayumi</h1>
    <span id="connStatus" class="badge closed">closed</span>
    <span id="modeBadge" class="badge">conversation</span>
  </header>

  <div class="toolbar">
    <input id="token" type="text" placeholder="Token (dev)" value="dev" aria-label="Auth token">
    <button id="btnConnect" type="button">Connect</button>
    <button id="btnDisconnect" type="button" disabled>Disconnect</button>
    <select id="modeSelect" disabled aria-label="Session mode">
      <option value="conversation">Conversation</option>
      <option value="meeting">Meeting (stub)</option>
    </select>
    <button id="btnMic" type="button" disabled>Mic</button>
    <button id="btnInterrupt" type="button" class="danger" disabled>Interrupt</button>
  </div>

  <div class="main">
    <section class="conversation">
      <div class="caption-bar">
        <label for="captionText">Live caption</label>
        <p id="captionText" class="empty">Waiting for assistant…</p>
      </div>
      <div id="chatThread" class="chat-thread" aria-live="polite"></div>
      <div class="input-bar">
        <input id="chatInput" type="text" placeholder="Type a message…" disabled>
        <button id="btnSend" type="button" disabled>Send</button>
      </div>
    </section>

    <aside class="sidebar">
      <h2>Activity</h2>
      <div id="activityFeed" class="activity-feed">
        <p class="empty">No background tasks yet.</p>
      </div>
      <div id="audioStatus" class="audio-status">
        Playback: <span id="playbackState">idle</span> ·
        Capture: <span id="captureState">idle</span>
      </div>
      <button id="btnDebug" type="button" class="debug-toggle">Show debug log</button>
      <div id="debugLog" aria-hidden="true"></div>
    </aside>
  </div>

  <script src="client.js"></script>
</body>
</html>
