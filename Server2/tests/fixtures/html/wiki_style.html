<h1>Mars</h1>
<p>Mars is the fourth planet from the Sun. It is known as the Red Planet due to iron oxide on its surface.</p>
<p>Mars has two small moons, Phobos and Deimos. Robotic missions have studied its geology and atmosphere for decades.</p>
