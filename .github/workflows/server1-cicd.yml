name: Server1 CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "Server1/**"
      - ".github/workflows/server1-cicd.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "Server1/**"
      - ".github/workflows/server1-cicd.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: Server1/package-lock.json

      - name: Install dependencies
        working-directory: Server1
        run: npm ci

      - name: Typecheck
        working-directory: Server1
        run: npm run typecheck

      - name: Build
        working-directory: Server1
        run: npm run build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Deploy Server1 to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          heroku git:remote -a "$HEROKU_APP_NAME"
          git push heroku `git subtree split --prefix Server1 HEAD`:refs/heads/main --force
